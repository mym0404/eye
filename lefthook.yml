pre-commit:
  jobs:
    - name: lint
      run: pnpm run lint
    - name: typecheck
      run: pnpm run typecheck
    - name: test
      run: pnpm run test

pre-push:
  jobs:
    - name: validate
      run: pnpm run validate
    - name: docs-check
      run: pnpm docs:check
    - name: build
      run: pnpm run build
