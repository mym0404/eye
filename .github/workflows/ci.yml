name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Enable Corepack
        run: corepack enable

      - name: Install runtime prerequisites
        run: sudo apt-get update && sudo apt-get install --yes ripgrep universal-ctags

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Doctor
        run: pnpm run doctor

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: MCP E2E
        run: pnpm run test:e2e

      - name: Coverage
        run: pnpm run test:coverage

      - name: Build
        run: pnpm run build

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage

      - name: Upload Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          disable_search: true
          fail_ci_if_error: true
          verbose: false
